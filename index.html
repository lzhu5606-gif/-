<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>图库（Supabase）小住</title>
  
  <!-- 引入 Tailwind CSS 库 -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 React 和 ReactDOM 库 -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- 引入 Babel 库 -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- 引入 Supabase 云数据库 SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --app-bg: #F5F5F7;
    }
    body {
      background-color: var(--app-bg);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
    }
    /* 隐藏滚动条 */
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    /* 苹果安全区适配 */
    @supports (padding-top: env(safe-area-inset-top)) {
      .safe-top { padding-top: max(env(safe-area-inset-top), 16px); }
      .safe-bottom { padding-bottom: max(env(safe-area-inset-bottom), 24px); }
    }

    /* 平滑过渡动画 */
    .fade-enter-active { animation: fadeIn 0.3s ease-out forwards; }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.98); }
      to { opacity: 1; transform: scale(1); }
    }
    
    /* 卡片悬浮发光效果 */
    .glass-card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid rgba(255,255,255,0.6);
    }
  </style>
</head>
<body>
  
  <div id="root"></div>

  <!-- React 逻辑代码区 -->
  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    // =========================================================================
    // 👇👇👇 你的专属 Supabase 数据库配置区 👇👇👇
    // 将你在 Supabase 申请到的两串代码填在这里，切记保留英文双引号！
    // =========================================================================
    const mySupabaseConfig = {
      url: "https://gfmjapeyxoquylmygcsz.supabase.co",
      key: "sb_publishable_cFdVq81YUUayBCUPdQMWDg_WjzmOdX8"
    };
    // =========================================================================

    // --- 高级 SVG 图标组件 ---
    const PlusIcon = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M5 12h14"/><path d="M12 5v14"/></svg>;
    const XIcon = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>;
    const ImageIcon = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>;
    const TrashIcon = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>;
    const UploadCloudIcon = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/><path d="M12 12v9"/><path d="m16 16-4-4-4 4"/></svg>;
    const CheckCircleIcon = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>;
    const LoaderIcon = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={`animate-spin ${className}`}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>;
    const CloudIcon = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></svg>;
    const ChevronLeftIcon = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m15 18-6-6 6-6"/></svg>;
    const ChevronRightIcon = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m9 18 6-6-6-6"/></svg>;

    function App() {
      // 核心数据状态
      const [images, setImages] = useState([]);
      const [isLoadingDB, setIsLoadingDB] = useState(true);
      const [isDbConfigured, setIsDbConfigured] = useState(false);
      const [userUid, setUserUid] = useState(''); 
      const [supabaseClient, setSupabaseClient] = useState(null); 
      
      // 页面视图状态
      const [activeMainCategory, setActiveMainCategory] = useState('行车记录仪');
      const [activeFilter, setActiveFilter] = useState('全部'); 
      const [viewingImage, setViewingImage] = useState(null); 
      
      // 上传抽屉状态
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [isSaving, setIsSaving] = useState(false);
      const [saveStatusText, setSaveStatusText] = useState(''); // 用于显示上传状态文本
      const [uploadCategory, setUploadCategory] = useState('行车记录仪'); 
      const [newName, setNewName] = useState(''); 
      
      // 【重点重构区 1】：不仅保存预览的 base64，还要保存用于上传的真实文件 Blob
      const [newImagesData, setNewImagesData] = useState([]); // 结构：[{ preview: string, blob: Blob }]
      
      const fileInputRef = useRef(null);
      const [toastMsg, setToastMsg] = useState('');
      const [confirmDeleteId, setConfirmDeleteId] = useState(null);

      const showToast = (msg) => {
        setToastMsg(msg);
        setTimeout(() => setToastMsg(''), 3000);
      };

      // 1. 初始化 Supabase
      useEffect(() => {
        let localUid = localStorage.getItem('dashcam_user_uid');
        if (!localUid) {
          localUid = 'user_' + Math.random().toString(36).substr(2, 9);
          localStorage.setItem('dashcam_user_uid', localUid);
        }
        setUserUid(localUid);

        if (!mySupabaseConfig.url || mySupabaseConfig.url.includes("填入")) {
          setIsLoadingDB(false);
          setIsDbConfigured(false);
          return;
        }

        try {
          const client = window.supabase.createClient(mySupabaseConfig.url, mySupabaseConfig.key);
          setSupabaseClient(client);
          setIsDbConfigured(true);
        } catch (err) {
          console.error("Supabase 初始化失败:", err);
          setIsLoadingDB(false);
          showToast("数据库连接失败，请检查配置代码");
        }
      }, []);

      // 2. 从 Supabase 拉取数据
      useEffect(() => {
        if (supabaseClient) {
          fetchImages(supabaseClient);
        }
      }, [supabaseClient]);

      const fetchImages = async (client) => {
        setIsLoadingDB(true);
        const { data, error } = await client
          .from('dashcam_images')
          .select('*')
          .order('timestamp', { ascending: false })
          .limit(1000);

        if (error) {
          console.error("加载数据失败", error);
          setIsLoadingDB(false);
        } else {
          const dbImages = data.map(item => ({
            id: item.id,
            name: item.name,
            category: item.category || '行车记录仪',
            url: item.url, // 这里的 url 现在将会是一个简短的网络链接
            uploaderId: item.uploaderid,
            timestamp: item.timestamp
          }));
          setImages(dbImages);
          setIsLoadingDB(false);
        }
      };

      // 数据处理逻辑
      const mainCategoryImages = useMemo(() => {
        return images.filter(img => img.category === activeMainCategory);
      }, [images, activeMainCategory]);

      const groupedImages = useMemo(() => {
        const groups = {};
        mainCategoryImages.forEach(img => {
          if (!groups[img.name]) groups[img.name] = [];
          groups[img.name].push(img);
        });
        return groups;
      }, [mainCategoryImages]);

      const categories = ['全部', ...Object.keys(groupedImages)];

      // 【重点重构区 2】：选择图片并压缩，提取真实的二进制文件 (Blob) 备用
      const processFile = (file) => {
        return new Promise((resolve) => {
          const reader = new FileReader();
          reader.onloadend = () => {
            const img = new Image();
            img.src = reader.result;
            img.onload = () => {
              const canvas = document.createElement('canvas');
              const MAX_WIDTH = 1200;
              const MAX_HEIGHT = 1200;
              let width = img.width;
              let height = img.height;

              if (width > height && width > MAX_WIDTH) {
                height *= MAX_WIDTH / width;
                width = MAX_WIDTH;
              } else if (height > MAX_HEIGHT) {
                width *= MAX_HEIGHT / height;
                height = MAX_HEIGHT;
              }
              canvas.width = width;
              canvas.height = height;
              const ctx = canvas.getContext('2d');
              ctx.drawImage(img, 0, 0, width, height);
              
              // 生成 base64 用于本地飞速预览
              const previewDataUrl = canvas.toDataURL('image/jpeg', 0.8);
              
              // 生成 Blob (真正的文件格式) 用于静默上传，既省流又合规
              canvas.toBlob((blob) => {
                 resolve({ preview: previewDataUrl, blob: blob });
              }, 'image/jpeg', 0.8);
            };
          };
          reader.readAsDataURL(file);
        });
      };

      const handleFileChange = async (e) => {
        const files = Array.from(e.target.files);
        if (!files.length) return;

        const remainingSlots = 4 - newImagesData.length;
        if (remainingSlots <= 0) {
          showToast("一次最多只能选择4张图片");
          return;
        }

        const filesToProcess = files.slice(0, remainingSlots);
        if (files.length > remainingSlots) {
          showToast(`最多4张，已自动截取前${remainingSlots}张`);
        }
        
        // 使用 Promise.all 等待所有图片压缩和转换完成
        const processedImages = await Promise.all(filesToProcess.map(file => processFile(file)));
        setNewImagesData(prev => [...prev, ...processedImages]);
        
        if(fileInputRef.current) fileInputRef.current.value = '';
      };

      const removeNewImage = (indexToRemove) => {
        setNewImagesData(prev => prev.filter((_, idx) => idx !== indexToRemove));
      };

      // 【重点重构区 3】：真正实现图片上传到 Storage + URL 保存到 Database
      const handleSave = async () => {
        if (!newName.trim() || newImagesData.length === 0 || isSaving) return;
        if (!isDbConfigured || !supabaseClient) {
          showToast("请先在代码中配置好密钥！"); return;
        }

        setIsSaving(true);
        try {
          const newRows = [];
          
          // 步骤 A：把每一张图片上传到名为 'images' 的存储桶
          for (let i = 0; i < newImagesData.length; i++) {
            setSaveStatusText(`正在上传图片 (${i + 1}/${newImagesData.length})...`);
            
            const imgObj = newImagesData[i];
            // 生成一个极难重复的文件名
            const fileName = `${Date.now()}_${Math.random().toString(36).substr(2, 9)}.jpg`;
            
            // 调用 Supabase Storage 上传接口
            const { data: uploadData, error: uploadError } = await supabaseClient.storage
              .from('images') // ⚠️ 确保你在后台建了名为 images 的公开存储桶
              .upload(fileName, imgObj.blob, {
                contentType: 'image/jpeg',
                cacheControl: '3600',
                upsert: false
              });

            if (uploadError) {
              console.error("图片上传到存储桶失败:", uploadError);
              throw new Error(`图片上传失败，请检查是否在后台创建了公开的 'images' 存储桶`);
            }

            // 获取该图片的公共直链 (短链接)
            const { data: { publicUrl } } = supabaseClient.storage
              .from('images')
              .getPublicUrl(fileName);

            // 准备数据库插入的数据
            newRows.push({
              name: newName.trim(),
              category: uploadCategory,
              url: publicUrl, // 🎉 这里存入的就是短链接，不再是几百万字的 base64 了！
              uploaderid: userUid,
              timestamp: Date.now()
            });
          }

          // 步骤 B：把精简后的数据信息插入到 Database
          setSaveStatusText("正在归档数据...");
          const { error: dbError } = await supabaseClient.from('dashcam_images').insert(newRows);

          if (dbError) throw dbError;
          
          // 成功后的收尾工作
          setNewName('');
          setNewImagesData([]);
          setIsModalOpen(false);
          setActiveMainCategory(uploadCategory);
          setActiveFilter(newName.trim());
          
          showToast(`成功上传 ${newRows.length} 张图片！`);
          fetchImages(supabaseClient); 

        } catch (error) {
          showToast(error.message || "上传失败，请检查网络和数据库配置");
          console.error(error);
        } finally {
          setIsSaving(false);
          setSaveStatusText("");
        }
      };

      // 确认删除
      const handleDelete = async (id, imgUploaderId) => {
        if (userUid !== imgUploaderId) {
          showToast('为防止误操作，只能删除你自己上传的图片');
          return;
        }
        setConfirmDeleteId(id);
      };

      // 【重点重构区 4】：彻底删除，不仅删库，连带存储桶里的源文件一起删掉，节省云空间！
      const executeDelete = async () => {
        if (!confirmDeleteId) return;
        
        // 先找到要删除的图片信息
        const targetImage = images.find(img => img.id === confirmDeleteId);
        
        try {
          // 1. 如果图片是在存储桶里的，提取文件名并从存储桶删除原图
          if (targetImage && targetImage.url && targetImage.url.includes('/storage/v1/object/public/images/')) {
             const urlParts = targetImage.url.split('/');
             const fileName = urlParts[urlParts.length - 1];
             if (fileName) {
                 await supabaseClient.storage.from('images').remove([fileName]);
             }
          }

          // 2. 从 Database 中删除记录
          const { error } = await supabaseClient
            .from('dashcam_images')
            .delete()
            .eq('id', confirmDeleteId);
            
          if (error) throw error;
          
          showToast('已彻底删除该图片');
          if (viewingImage?.id === confirmDeleteId) setViewingImage(null);
          setImages(prev => prev.filter(img => img.id !== confirmDeleteId));
          
        } catch(e) {
          showToast('删除失败，可能图片已不存在');
          console.error(e);
        } finally {
          setConfirmDeleteId(null);
        }
      };

      const navigateImage = (direction, e) => {
        e.stopPropagation();
        if (!viewingImage) return;
        const groupImgs = groupedImages[viewingImage.name];
        if (!groupImgs) return;
        
        const currentIndex = groupImgs.findIndex(img => img.id === viewingImage.id);
        if (direction === 'prev' && currentIndex > 0) {
          setViewingImage(groupImgs[currentIndex - 1]);
        } else if (direction === 'next' && currentIndex < groupImgs.length - 1) {
          setViewingImage(groupImgs[currentIndex + 1]);
        }
      };

      return (
        <div className="min-h-screen relative pb-24">
          
          {/* 全局提示 Toast */}
          <div className={`fixed top-14 left-1/2 transform -translate-x-1/2 z-[100] bg-gray-900/95 backdrop-blur-xl text-white px-6 py-3.5 rounded-full shadow-2xl text-sm font-semibold transition-all duration-400 pointer-events-none flex items-center gap-2 ${toastMsg ? 'opacity-100 translate-y-0 scale-100' : 'opacity-0 -translate-y-8 scale-95'}`}>
            {toastMsg.includes('成功') && <CheckCircleIcon size={18} className="text-green-400" />}
            {toastMsg}
          </div>

          {/* 删除确认弹窗 */}
          {confirmDeleteId && (
            <div className="fixed inset-0 bg-black/40 backdrop-blur-md z-[90] flex items-center justify-center p-5 fade-enter-active">
               <div className="bg-white/90 backdrop-blur-2xl rounded-[32px] p-7 max-w-sm w-full shadow-[0_20px_40px_rgba(0,0,0,0.2)] border border-white/50 text-center">
                  <div className="w-14 h-14 bg-red-100 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4">
                    <TrashIcon size={28} />
                  </div>
                  <h3 className="text-xl font-bold mb-2 text-gray-900 tracking-tight">彻底删除图片？</h3>
                  <p className="text-gray-500 mb-8 text-sm leading-relaxed">此操作不仅会删除图库记录，还会从云端空间销毁原图，不可恢复。</p>
                  <div className="flex gap-4">
                    <button onClick={() => setConfirmDeleteId(null)} className="flex-1 py-3.5 bg-gray-100/80 hover:bg-gray-200 rounded-2xl font-bold text-gray-700 active:scale-95 transition-all">取消</button>
                    <button onClick={executeDelete} className="flex-1 py-3.5 bg-red-500 hover:bg-red-600 rounded-2xl font-bold text-white active:scale-95 transition-all shadow-lg shadow-red-500/30">确认删除</button>
                  </div>
               </div>
            </div>
          )}

          {/* 顶部导航 */}
          <header className="sticky top-0 z-40 bg-white/60 backdrop-blur-2xl border-b border-gray-200/50 safe-top pt-4">
            <div className="flex items-center justify-between px-6 pb-4">
              <h1 className="text-[28px] font-bold tracking-tight text-gray-900">产品图库</h1>
              <div className="flex items-center gap-2">
                {isLoadingDB && <LoaderIcon size={20} className="text-gray-400" />}
              </div>
            </div>
            
            <div className="px-6 pb-2">
              <div className="flex bg-gray-200/70 p-1 rounded-[14px]">
                {['行车记录仪', 'carplay'].map(cat => (
                  <button 
                    key={cat} 
                    onClick={() => { setActiveMainCategory(cat); setActiveFilter('全部'); }}
                    className={`flex-1 py-2 text-[15px] font-bold rounded-[10px] transition-all duration-300 ${activeMainCategory === cat ? 'bg-white text-gray-900 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}
                  >
                    {cat}
                  </button>
                ))}
              </div>
            </div>

            {categories.length > 1 && (
              <div className="px-6 pb-4 pt-3 overflow-x-auto hide-scrollbar">
                <div className="flex space-x-2.5">
                  {categories.map((cat) => (
                    <button key={cat} onClick={() => setActiveFilter(cat)}
                      className={`whitespace-nowrap px-5 py-2 rounded-full text-[14px] font-semibold transition-all duration-300 ${activeFilter === cat ? 'bg-gray-900 text-white shadow-md' : 'bg-gray-200/50 text-gray-600 hover:bg-gray-200 active:scale-95'}`}>
                      {cat}
                    </button>
                  ))}
                </div>
              </div>
            )}
          </header>

          {/* 主体内容 */}
          <main className="p-4 md:p-6 max-w-5xl mx-auto">
            {isLoadingDB ? (
              <div className="flex flex-col items-center justify-center pt-32 text-gray-400 space-y-4">
                <LoaderIcon size={40} className="text-blue-500" />
                <p className="font-medium">正在读取云端分组...</p>
              </div>
            ) : (!isDbConfigured) ? (
              <div className="flex flex-col items-center justify-center pt-32 pb-20 px-6 text-center">
                <div className="w-24 h-24 bg-red-50 rounded-full flex items-center justify-center mb-6 shadow-inner">
                  <XIcon size={40} className="text-red-500" />
                </div>
                <h2 className="text-2xl font-bold text-gray-900 mb-2">未配置 Supabase 数据库</h2>
                <p className="text-gray-500 mb-8 max-w-xs leading-relaxed">请在代码开头的 <code>mySupabaseConfig</code> 中填入你的项目配置，并在后台 SQL 中建好数据表。</p>
              </div>
            ) : mainCategoryImages.length === 0 ? (
              <div className="flex flex-col items-center justify-center pt-32 pb-20 px-6 text-center">
                <div className="w-24 h-24 bg-blue-50 rounded-full flex items-center justify-center mb-6 shadow-inner">
                  <UploadCloudIcon size={40} className="text-blue-500" />
                </div>
                <h2 className="text-2xl font-bold text-gray-900 mb-2">该分类下还没有图片</h2>
                <p className="text-gray-500 mb-8 max-w-xs leading-relaxed">点击右下角加号，为【{activeMainCategory}】上传第一组图片吧！</p>
                <button 
                  onClick={() => { setIsModalOpen(true); setUploadCategory(activeMainCategory); }}
                  className="px-8 py-3.5 bg-blue-600 text-white font-bold rounded-full shadow-lg shadow-blue-500/30 hover:bg-blue-700 active:scale-95 transition-all"
                >
                  上传图片
                </button>
              </div>
            ) : (
              <div className="space-y-10">
                {Object.entries(groupedImages).map(([modelName, groupImgs]) => {
                  if (activeFilter !== '全部' && activeFilter !== modelName) return null;
                  
                  return (
                    <section key={modelName} className="fade-enter-active">
                      <div className="flex items-center justify-between mb-4 px-1">
                        <div className="flex items-center gap-3">
                          <h2 className="text-[22px] font-bold text-gray-900 tracking-tight">{modelName}</h2>
                          <span className="text-xs font-bold text-blue-600 bg-blue-100 px-2.5 py-1 rounded-full">
                            共 {groupImgs.length} 张
                          </span>
                        </div>
                      </div>
                      
                      <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3 md:gap-5">
                        {groupImgs.map((img) => (
                          <div 
                            key={img.id} 
                            className="group relative bg-gray-100 rounded-[20px] shadow-sm hover:shadow-lg transition-all duration-300 overflow-hidden cursor-pointer aspect-square transform hover:-translate-y-1"
                            onClick={() => setViewingImage(img)}
                          >
                            <img 
                              src={img.url} alt={img.name} 
                              loading="lazy"
                              className="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105"
                            />
                            <button 
                              onClick={(e) => { e.stopPropagation(); handleDelete(img.id, img.uploaderId); }} 
                              className="absolute top-2 right-2 p-2 bg-black/30 backdrop-blur-md rounded-full text-white opacity-0 group-hover:opacity-100 hover:bg-red-500 active:scale-90 transition-all"
                            >
                              <TrashIcon size={16} />
                            </button>
                            <div className="absolute bottom-2 left-2 p-1.5 bg-black/30 backdrop-blur-md rounded-full text-white">
                               <CloudIcon size={14} />
                            </div>
                          </div>
                        ))}
                      </div>
                    </section>
                  );
                })}
              </div>
            )}
          </main>

          {/* 悬浮操作按钮 */}
          {isDbConfigured && (
            <button 
              onClick={() => setIsModalOpen(true)}
              className="fixed bottom-8 right-6 z-40 w-16 h-16 bg-gradient-to-tr from-blue-600 to-indigo-500 text-white rounded-full shadow-[0_10px_25px_rgba(59,130,246,0.5)] flex items-center justify-center hover:scale-105 hover:shadow-[0_15px_35px_rgba(59,130,246,0.6)] active:scale-95 transition-all duration-300"
            >
              <PlusIcon size={32} />
            </button>
          )}

          {/* 全屏图片查看器 */}
          {viewingImage && (
            <div className="fixed inset-0 z-[80] bg-black/95 backdrop-blur-lg flex flex-col fade-enter-active">
              <div className="flex items-center justify-between p-4 safe-top text-white">
                <div className="flex-1 text-sm text-gray-400 font-medium">
                  {groupedImages[viewingImage.name] && (
                     <span>{groupedImages[viewingImage.name].findIndex(i => i.id === viewingImage.id) + 1} / {groupedImages[viewingImage.name].length}</span>
                  )}
                </div>
                <h2 className="text-lg font-bold tracking-wider">{viewingImage.name}</h2>
                <div className="flex-1 flex justify-end gap-2">
                  <button onClick={(e) => { e.stopPropagation(); handleDelete(viewingImage.id, viewingImage.uploaderId); }} className="p-2 text-white/70 hover:text-red-500 transition-colors">
                    <TrashIcon size={24} />
                  </button>
                  <button onClick={() => setViewingImage(null)} className="p-2 text-white/70 hover:text-white transition-colors">
                    <XIcon size={28} />
                  </button>
                </div>
              </div>

              <div className="flex-1 flex items-center justify-between p-2 md:p-8 overflow-hidden" onClick={() => setViewingImage(null)}>
                <button 
                  onClick={(e) => navigateImage('prev', e)}
                  className={`p-3 md:p-5 text-white/50 hover:text-white bg-black/20 hover:bg-black/50 rounded-full backdrop-blur-sm transition-all ${groupedImages[viewingImage.name].findIndex(i => i.id === viewingImage.id) === 0 ? 'opacity-0 cursor-default' : 'opacity-100'}`}
                >
                  <ChevronLeftIcon size={36} />
                </button>

                <img 
                  src={viewingImage.url} 
                  alt={viewingImage.name} 
                  className="max-w-[70vw] md:max-w-[80vw] max-h-full object-contain rounded-lg shadow-2xl"
                  onClick={(e) => e.stopPropagation()} 
                />

                <button 
                  onClick={(e) => navigateImage('next', e)}
                  className={`p-3 md:p-5 text-white/50 hover:text-white bg-black/20 hover:bg-black/50 rounded-full backdrop-blur-sm transition-all ${groupedImages[viewingImage.name].findIndex(i => i.id === viewingImage.id) === groupedImages[viewingImage.name].length - 1 ? 'opacity-0 cursor-default' : 'opacity-100'}`}
                >
                  <ChevronRightIcon size={36} />
                </button>
              </div>
            </div>
          )}

          {/* 底部上传抽屉 */}
          <div 
            className={`fixed inset-0 bg-black/30 backdrop-blur-sm z-50 transition-opacity duration-400 ${isModalOpen ? 'opacity-100 visible' : 'opacity-0 invisible'}`} 
            onClick={() => setIsModalOpen(false)}
          ></div>
          
          <div className={`fixed bottom-0 left-0 right-0 z-50 glass-card bg-white/80 rounded-t-[36px] shadow-[0_-10px_40px_rgba(0,0,0,0.1)] transition-transform duration-400 transform max-w-2xl mx-auto ${isModalOpen ? 'translate-y-0' : 'translate-y-full'} flex flex-col max-h-[90vh]`}>
            <div className="p-6 sm:p-8 safe-bottom overflow-y-auto hide-scrollbar">
              <div className="w-12 h-1.5 bg-gray-300/80 rounded-full mx-auto mb-8 shrink-0"></div>
              
              <div className="flex items-center justify-between mb-6 shrink-0">
                <h2 className="text-[22px] font-bold text-gray-900 tracking-tight">上传至云端图库</h2>
                <button onClick={() => setIsModalOpen(false)} className="p-2 bg-gray-100/80 rounded-full text-gray-500 hover:bg-gray-200 active:scale-90 transition-all">
                  <XIcon size={20} />
                </button>
              </div>
              
              <div className="space-y-6">
                
                {/* 选择大分类 */}
                <div>
                  <label className="block text-[15px] font-semibold text-gray-700 mb-2 ml-1">所属分类</label>
                  <div className="flex bg-gray-200/70 p-1 rounded-[14px]">
                    {['行车记录仪', 'carplay'].map(cat => (
                      <button 
                        key={cat} 
                        onClick={() => setUploadCategory(cat)}
                        className={`flex-1 py-2.5 text-[15px] font-bold rounded-[10px] transition-all duration-300 ${uploadCategory === cat ? 'bg-white text-blue-600 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}
                      >
                        {cat}
                      </button>
                    ))}
                  </div>
                </div>

                {/* 填写型号 */}
                <div>
                  <label className="block text-[15px] font-semibold text-gray-700 mb-2 ml-1">归属型号 / 新型号命名</label>
                  
                  {categories.length > 1 && uploadCategory === activeMainCategory && (
                    <div className="flex flex-wrap gap-2 mb-3 ml-1">
                      {categories.filter(c => c !== '全部').map(cat => (
                        <button 
                          key={cat} 
                          onClick={() => setNewName(cat)} 
                          className={`text-sm px-3.5 py-1.5 rounded-full border transition-all ${newName === cat ? 'bg-blue-100 border-blue-300 text-blue-700 font-bold' : 'bg-white border-gray-200 text-gray-600 hover:bg-gray-50'}`}
                        >
                          {cat}
                        </button>
                      ))}
                    </div>
                  )}

                  <input 
                    type="text" 
                    value={newName} 
                    onChange={(e) => setNewName(e.target.value)} 
                    placeholder="例如：IK10 Pro" 
                    className="w-full px-5 py-4 bg-white/70 border-2 border-white/50 rounded-[20px] text-lg font-medium focus:bg-white focus:border-blue-500 focus:shadow-[0_0_0_4px_rgba(59,130,246,0.1)] outline-none transition-all placeholder:text-gray-400" 
                  />
                </div>
                
                {/* 图片选择与展示区 */}
                <div>
                  <label className="block text-[15px] font-semibold text-gray-700 mb-2 ml-1">选择图片 (最多4张)</label>
                  
                  <div className="grid grid-cols-2 gap-3">
                    {newImagesData.map((imgObj, idx) => (
                      <div key={idx} className="relative aspect-video rounded-[16px] overflow-hidden border border-gray-200 shadow-sm group">
                        <img src={imgObj.preview} className="w-full h-full object-cover" />
                        <button 
                          onClick={() => removeNewImage(idx)}
                          className="absolute top-2 right-2 bg-black/60 backdrop-blur-md text-white p-1.5 rounded-full opacity-90 hover:bg-red-500 transition-colors"
                        >
                          <XIcon size={14} />
                        </button>
                      </div>
                    ))}
                    
                    {newImagesData.length < 4 && (
                      <div 
                        onClick={() => fileInputRef.current?.click()} 
                        className="aspect-video rounded-[16px] border-2 border-dashed border-gray-300 bg-white/50 hover:bg-blue-50/50 hover:border-blue-400 flex flex-col items-center justify-center cursor-pointer transition-all duration-300 group"
                      >
                        <div className="w-10 h-10 bg-white rounded-full shadow-sm flex items-center justify-center mb-2 group-hover:scale-110 transition-transform">
                           <PlusIcon size={20} className="text-blue-500" />
                        </div>
                        <span className="text-sm font-bold text-gray-400 group-hover:text-blue-500">添加 ({newImagesData.length}/4)</span>
                      </div>
                    )}
                  </div>
                  <input type="file" ref={fileInputRef} onChange={handleFileChange} accept="image/*" multiple className="hidden" />
                </div>
                
                <button 
                  onClick={handleSave} 
                  disabled={!newName.trim() || newImagesData.length === 0 || isSaving} 
                  className={`w-full py-4 mt-2 rounded-[20px] font-bold text-lg transition-all duration-300 flex items-center justify-center gap-2 ${(!newName.trim() || newImagesData.length === 0 || isSaving) ? 'bg-gray-200 text-gray-400 cursor-not-allowed' : 'bg-gradient-to-r from-blue-600 to-blue-500 text-white shadow-[0_10px_20px_rgba(59,130,246,0.3)] hover:shadow-[0_15px_25px_rgba(59,130,246,0.4)] active:scale-[0.98]'}`}
                >
                  {isSaving ? (
                    <><LoaderIcon size={22} className="text-white/80"/> {saveStatusText}</>
                  ) : `发布 ${newImagesData.length || ''} 张到图库`}
                </button>
              </div>
            </div>
          </div>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
